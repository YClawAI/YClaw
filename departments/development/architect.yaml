name: architect
department: development
description: >-
  Technical lead of the Development department. Receives all assigned GitHub
  issues, plans project architecture, organizes work across repos, breaks down
  issues into executable tasks for coding agents, and reviews all code for
  quality and security.

model:
  provider: anthropic
  model: claude-opus-4-6
  temperature: 0.3
  maxTokens: 16384

system_prompts:
  - claudeception.md
  - skill-usage.md
  - mission_statement.md
  - chain-of-command.md
  - daily-standup-dev.md
  - engineering-standards.md
  - protocol-overview.md
  - executive-directive.md
  - escalation-policy.md
  - architect-workflow.md
  # architect-workflow-reference.md — loaded on-demand via vault:read for deep technical tasks

triggers:
  - type: cron
    schedule: "2 13 * * *"
    task: daily_standup
    model:
      provider: anthropic
      model: claude-sonnet-4-20250514
      maxTokens: 4096
      temperature: 0.2

  # VELOCITY FIX: Architect no longer gates PRs.
  # PRs auto-merge on CI pass. Architect does post-merge audits.
  - type: event
    event: github:pr_opened
    task: audit_pr
  - type: event
    event: ao:pr_ready
    task: audit_pr

  - type: cron
    schedule: "0 20 * * 0"
    task: tech_debt_scan

  # Stale issue sweep — catches issues missed by real-time event triggers
  # Removes stale in-progress labels, delegates eligible unworked issues to AO
  - type: cron
    schedule: "0 */6 * * *"
    task: stale_issue_sweep
    model:
      provider: anthropic
      model: claude-sonnet-4-20250514
      maxTokens: 4096
      temperature: 0.2

  # Pipeline health scan — ensures all repos have CI, infra, branch protection
  - type: cron
    schedule: "30 */3 * * *"
    task: pipeline_health_scan
    description: "Scan all registered repos for missing pipeline components"
    model:
      provider: anthropic
      model: claude-sonnet-4-20250514
      maxTokens: 4096
      temperature: 0.2

  - type: event
    event: strategist:architect_directive
    task: architecture_directive

  - type: event
    event: github:issue_assigned
    task: plan_and_delegate
  - type: event
    event: ao:task_completed
    task: verify_completion
  - type: event
    event: ao:task_blocked
    task: resolve_blocker
  - type: event
    event: ao:task_failed
    task: handle_task_failure

  # F1: Event-driven issue discovery — triage new issues (label only, no delegation)
  - type: event
    event: github:issue_opened
    task: triage_new_issue
    model:
      provider: anthropic
      model: claude-sonnet-4-20250514
      maxTokens: 4096
      temperature: 0.2

  # F1: Event-driven issue discovery — evaluate labeled issues for delegation
  - type: event
    event: github:issue_labeled
    task: evaluate_and_delegate
    model:
      provider: anthropic
      model: claude-sonnet-4-20250514
      maxTokens: 8192
      temperature: 0.3

  # Deploy Governance v2: sole required reviewer for CRITICAL-tier deployments
  - type: event
    event: deploy:review
    task: review_deploy

  # Merge conflict resolution
  - type: event
    event: architect:rebase_needed
    task: evaluate_rebase

  - type: event
    event: claudeception:reflect
    task: self_reflection
    model:
      provider: anthropic
      model: claude-sonnet-4-20250514
      temperature: 0.5
      maxTokens: 4096

actions:
  - github:get_contents
  - github:get_diff
  - github:get_issue
  - github:create_issue
  - github:list_issues
  - github:update_issue
  - github:pr_comment
  - github:add_labels
  - github:remove_label
  - ao:status
  - repo:list
  - vault:read
  - vault:search
  - vault:write
  - discord:message
  - discord:thread_reply
  - discord:react
  - event:publish
  - deploy:assess

data_sources: []

event_subscriptions:
  - claudeception:reflect
  - github:pr_opened
  - github:issue_assigned
  - github:issue_opened
  - github:issue_labeled
  - ao:pr_ready
  - ao:task_completed
  - ao:task_blocked
  - ao:task_failed
  - strategist:architect_directive
  - deploy:review
  - architect:rebase_needed

event_publications:
  - standup:report
  - architect:pr_review
  - architect:task_complete
  - architect:deploy_review
  - architect:build_directive
  - architect:design_directive
  - architect:mechanic_task

review_bypass: []

heartbeat:
  precheck:
    enabled: true
    maxSilenceHours: 6