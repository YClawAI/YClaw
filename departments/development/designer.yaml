name: designer
department: development
description: >-
  Enforces design system compliance in frontend work. Reviews PRs for visual
  consistency, accessibility, and brand alignment. Shares the design system
  source of truth with Forge.

model:
  provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.1
  maxTokens: 8192

system_prompts:
  - claudeception.md
  - skill-usage.md
  - mission_statement.md
  - chain-of-command.md
  - daily-standup-dev.md
  - engineering-standards.md
  - protocol-overview.md
  - designer-workflow.md

triggers:
  - type: cron
    schedule: "8 13 * * *"
    task: daily_standup
  - type: event
    event: ao:pr_ready
    task: design_review
  - type: event
    event: forge:asset_ready
    task: integrate_design_update
  - type: event
    event: strategist:designer_directive
    task: design_directive
  - type: event
    event: strategist:design_generate
    task: design_generate
  - type: event
    event: architect:design_directive
    task: implement_design
  - type: event
    event: claudeception:reflect
    task: self_reflection
    model:
      provider: anthropic
      model: claude-sonnet-4-20250514
      temperature: 0.5
      maxTokens: 4096
actions:
  - github:commit_file
  - github:get_contents
  - github:get_diff
  - github:create_branch
  - github:create_issue
  - github:pr_comment
  - github:pr_review
  - discord:message
  - discord:thread_reply
  - discord:react
  - event:publish
  - figma:get_file
  - figma:get_node
  - figma:get_images
  - figma:get_components
  - figma:get_styles
  - figma:post_comment
  - figma:get_comments
  - figma:get_variables
  - figma:get_file_versions
  - stitch:list_projects
  - stitch:create_project
  - stitch:generate_screen
  - stitch:edit_screens
  - stitch:generate_variants
  - stitch:get_screen
  - stitch:list_screens

data_sources:
  # Requires a github_repo fetcher to be registered for this data source to resolve.
  # Designer can also load design references on-demand via github:get_contents.
  - type: github_repo
    name: style-guide
    repo: your-org/STYLE-GUIDE
    description: "Brand voice, identity system, and design guidelines"

event_subscriptions:
  - claudeception:reflect
  - ao:pr_ready
  - forge:asset_ready
  - strategist:designer_directive
  - strategist:design_generate
  - architect:design_directive

event_publications:
  - standup:report
  - designer:design_review
  - designer:design_generated

review_bypass: []

heartbeat:
  precheck:
    enabled: true
    maxSilenceHours: 6
