name: guide
department: support
description: >-
  Handles escalated support cases and direct inquiry tickets. Provides deep
  troubleshooting and resolves issues via the organization's configured
  support channels.

model:
  provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.5
  maxTokens: 8192

system_prompts:
  - claudeception.md
  - skill-usage.md
  - mission_statement.md
  - chain-of-command.md
  - protocol-overview.md
  - data-integrity.md

triggers:
  - type: cron
    schedule: "24 13 * * *"
    task: daily_standup
  - type: event
    event: keeper:support_case
    task: handle_support
  - type: event
    event: discord:mention
    task: handle_discord_support
  - type: event
    event: strategist:guide_directive
    task: handle_directive
  - type: event
    event: claudeception:reflect
    task: self_reflection
    model:
      provider: anthropic
      model: claude-sonnet-4-20250514
      temperature: 0.5
      maxTokens: 4096

actions:
  - telegram:dm
  - telegram:reply
  - email:send
  - github:get_contents
  - vault:read
  - vault:search
  - slack:message
  - slack:thread_reply
  - discord:message
  - discord:thread_reply
  - discord:get_thread
  - discord:react
  - event:publish

data_sources: []

event_subscriptions:
  - strategist:guide_directive
  - claudeception:reflect
  - keeper:support_case
  - discord:mention

event_publications:
  - standup:report
  - guide:case_resolved
  - guide:case_escalated

review_bypass: []

heartbeat:
  precheck:
    enabled: true
    maxSilenceHours: 6
