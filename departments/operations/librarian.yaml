name: librarian
department: operations
description: >-
  Knowledge curator that maintains the Obsidian vault. Triages the
  vault/05-inbox/ folder, files notes into correct areas, deduplicates
  content, and ensures vault hygiene. Runs on daily and weekly cron
  schedules.

model:
  provider: anthropic
  model: claude-haiku-4-5
  temperature: 0.0
  maxTokens: 8192

system_prompts:
  - claudeception.md
  - skill-usage.md
  - mission_statement.md
  - chain-of-command.md
  - daily-standup.md
  - protocol-overview.md
  - escalation-policy.md
  - data-integrity.md
  - librarian-curation-workflow.md

triggers:
  # 13:30 UTC — lightweight intake pass before the deep daily_curation at 14:00.
  # Spec originally called for 14:00 but that would collide with daily_curation;
  # split into a fast triage + deep curation.
  - type: cron
    schedule: "30 13 * * *"
    task: inbox_triage
  - type: cron
    schedule: "0 14 * * *"
    task: daily_curation
  - type: cron
    schedule: "0 8 * * 1"
    task: weekly_curation
  - type: cron
    schedule: "0 9 * * 5"
    task: knowledge_hygiene_audit
  # Strategist → Librarian directives (was missing — Librarian had no way to
  # receive directed work from Strategist, per 2026-04-16 audit).
  - type: event
    event: strategist:librarian_directive
    task: handle_directive
  # Observe + normalize vault contributions from other agents.
  - type: event
    event: vault:entry_created
    task: ingest_vault_contribution
  - type: event
    event: vault:entry_updated
    task: review_vault_update
  # Persist operational/architectural knowledge into the permanent vault.
  - type: event
    event: sentinel:incident_report
    task: curate_incident_report
  - type: event
    event: architect:spec_finalized
    task: curate_architecture_decision
  - type: event
    event: claudeception:reflect
    task: self_reflection
    model:
      provider: anthropic
      model: claude-sonnet-4-6
      temperature: 0.5
      maxTokens: 4096

actions:
  - vault:read
  - vault:search
  - vault:write
  - vault:graph_query
  - github:commit_file
  - github:get_contents
  - discord:message
  - discord:thread_reply
  - discord:react
  - event:publish

data_sources: []

event_subscriptions:
  - claudeception:reflect
  - strategist:librarian_directive
  - vault:entry_created
  - vault:entry_updated
  - sentinel:incident_report
  - architect:spec_finalized

event_publications:
  - standup:report
  - librarian:curation_complete

review_bypass: []

heartbeat:
  precheck:
    enabled: true
    # 12h: Librarian is a daily-cadence agent. If it misses both its curation
    # cron AND its standup, an alert should fire. 26h effectively disabled
    # monitoring (2026-04-16 audit).
    maxSilenceHours: 12
