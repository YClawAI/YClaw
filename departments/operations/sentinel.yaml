name: sentinel
department: operations
description: >-
  System health and developer operations agent. Owns code quality audits,
  deployment pipeline health, and post-deploy verification. The sole Operations
  agent — focused entirely on internal infrastructure.

model:
  provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.0
  maxTokens: 8192

system_prompts:
  - claudeception.md
  - skill-usage.md
  - mission_statement.md
  - chain-of-command.md
  - daily-standup.md
  - protocol-overview.md
  - engineering-standards.md
  - escalation-policy.md
  - sentinel-quality-workflow.md

triggers:
  - type: cron
    schedule: "15 13 * * *"
    task: daily_standup
  - type: cron
    schedule: "0 */4 * * *"
    task: deployment_health
  - type: cron
    schedule: "0 10 * * 1,4"
    task: code_quality_audit
  - type: cron
    schedule: "0 17 * * 5"
    task: weekly_repo_digest
  - type: event
    # Deployer was retired in AO migration (2026-03-27). Architect now publishes
    # deploy_complete after AO successfully ships a new ECS revision.
    event: architect:deploy_complete
    task: post_deploy_verification
  # Deploy Governance v2: execute approved CRITICAL-tier deployments.
  # Moved from Strategist (separation of duties — the agent that assesses
  # should not also execute). Subscription permissions already allow deploy:*.
  - type: event
    event: deploy:approved
    task: execute_approved_deploy
    model:
      provider: anthropic
      model: claude-sonnet-4-20250514
      temperature: 0.2
      maxTokens: 4096
  - type: event
    event: strategist:sentinel_directive
    task: handle_directive
  - type: cron
    # Every 30 min = 48 LLM calls/day. Previously */5 (288 calls/day, unacceptable).
    # TODO: Replace with lightweight cURL/script probe that only escalates to LLM
    # on anomaly (threshold breach or state change). Target: 0 LLM calls/day on
    # the happy path + LLM only on failure. Tracked in ops-audit 2026-04-16.
    schedule: "*/30 * * * *"
    task: ao_health_check
  - type: event
    event: claudeception:reflect
    task: self_reflection
    model:
      provider: anthropic
      model: claude-sonnet-4-20250514
      temperature: 0.5
      maxTokens: 4096

actions:
  - deploy:status
  # deploy:assess added for deployment_health cron (every 4h). Referenced in README
  # and workflow; was missing from YAML ("hallucinated tool" wiring bug).
  - deploy:assess
  # deploy:execute moved here from Strategist (Deploy Governance v2 separation of duties).
  - deploy:execute
  - github:get_contents
  - github:get_diff
  - repo:list
  - discord:message
  - discord:thread_reply
  - discord:get_channel_history
  - discord:get_thread
  - discord:react
  - discord:alert
  - event:publish

data_sources: []

event_subscriptions:
  - strategist:sentinel_directive
  - claudeception:reflect
  - architect:deploy_complete
  # Deploy Governance v2 — Sentinel now handles approved-deploy execution.
  - deploy:approved

event_publications:
  - standup:report
  - sentinel:alert
  - sentinel:status_report
  - sentinel:quality_report

review_bypass: []

heartbeat:
  precheck:
    enabled: true
    maxSilenceHours: 6
