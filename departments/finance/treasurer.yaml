name: treasurer
department: finance
description: Financial watchdog responsible for treasury monitoring, cost tracking,
  and budget management across configured wallets and accounts.
model:
  provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0
  maxTokens: 8192
system_prompts:
  - claudeception.md
  - skill-usage.md
  - mission_statement.md
  - chain-of-command.md
  - daily-standup.md
  - data-integrity.md
  - protocol-overview.md
  - escalation-policy.md
  - executive-directive.md
triggers:
  - type: cron
    schedule: 22 13 * * *
    task: daily_standup
  - type: cron
    schedule: 0 7 * * *
    task: treasury_check
  - type: cron
    schedule: 0 8 * * 1
    task: weekly_spend
  - type: cron
    schedule: 0 8 1 * *
    task: monthly_summary
  - type: event
    event: strategist:treasurer_directive
    task: handle_directive
  - type: event
    event: claudeception:reflect
    task: self_reflection
    model:
      provider: anthropic
      model: claude-sonnet-4-6
      temperature: 0.5
      maxTokens: 4096
actions:
  - github:get_contents
  - discord:message
  - discord:thread_reply
  - discord:react
  - discord:alert
  - event:publish
data_sources:
  # ---- Infrastructure cost sources ----
  # NOTE: litellm_spend requires LiteLLM proxy to be configured (not active in YCLAW).
  # Treasurer will skip this source gracefully if the fetcher is not registered.
  - name: litellm_spend
    type: litellm_spend
    config: {}
  - name: openrouter_usage
    type: openrouter_usage
    config: {}
  - name: aws_cost_monthly
    type: aws_cost
    config:
      days: 30
  - name: mongodb_atlas_billing
    type: mongodb_atlas
    config: {}
  - name: redis_cloud_billing
    type: redis_cloud
    config: {}

  # ---- Future sources (add when needed) ----
  # Blockchain wallets, banking integrations, and additional cost
  # sources can be added here using supported data source types.
  # See departments/finance/README.md for configuration details.
event_subscriptions:
  - strategist:treasurer_directive
  - claudeception:reflect
event_publications:
  - standup:report
  - treasurer:low_balance
  - treasurer:spend_report
review_bypass: []
# escalation_suppression:
#   example_suppression:
#     wallets:
#       - <wallet_name>
#     reason: Intentionally unfunded during maintenance — directive received YYYY-MM-DD
#     rules:
#       suppress_low_balance_alerts: true
#       suppress_executive_escalation: true
#       suppress_action_needed_flags: true
#       include_in_weekly_spend_report: true
#       include_in_daily_treasury_check: true
#       note_in_reports_as: Intentionally unfunded (maintenance)
#     effective_date: YYYY-MM-DD
#     review_trigger: Re-enable escalation when maintenance ends — await further directive

heartbeat:
  precheck:
    enabled: true
    maxSilenceHours: 6
