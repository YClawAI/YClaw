name: ember
department: marketing
description: >-
  Content engine responsible for creating and publishing posts across the organization's
  configured social channels. Generates content batches based on Scout intelligence, brand
  voice guidelines, and executive directives. Coordinates with Forge for visual assets and
  submits all content through the Reviewer quality gate before publication.

model:
  provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.7
  maxTokens: 8192

system_prompts:
  - claudeception.md
  - skill-usage.md
  - mission_statement.md
  - chain-of-command.md
  - daily-standup.md
  - protocol-overview.md
  - executive-directive.md
  - brand-voice.md
  - review-submission.md
  - content-templates.md
  - content-safety-rules.md

triggers:
  - type: cron
    schedule: "10 13 * * *"
    task: daily_standup
  - type: cron
    schedule: "0 14 * * 1-5"       # Weekdays 14:00 UTC
    task: daily_content_batch
  - type: cron
    schedule: "30 16 * * 1-5"      # Weekdays 16:30 UTC
    task: midday_post
  - type: cron
    schedule: "0 22 * * 1-5"       # Weekdays 22:00 UTC
    task: afternoon_engagement
  - type: cron
    schedule: "0 15 * * 6,0"       # Weekends 15:00 UTC
    task: weekend_content
  - type: event
    event: forge:asset_ready
    task: publish_with_asset
  - type: event
    event: strategist:ember_directive
    task: handle_directive
  - type: event
    event: reviewer:approved
    task: publish_approved_content
  - type: event
    event: reviewer:flagged
    task: revise_flagged_content
  - type: event
    event: claudeception:reflect
    task: self_reflection
    model:
      provider: anthropic
      model: claude-sonnet-4-6
      temperature: 0.5
      maxTokens: 4096
actions:
  - github:commit_file
  - github:get_contents
  - github:create_branch
  - twitter:post
  - twitter:thread
  - twitter:reply
  - twitter:like
  - twitter:retweet
  - twitter:media_upload
  # twitter:update_profile* — moved to Strategist. Profile changes require directive + approval.
  # Forge creates assets, Strategist executes profile updates via forge:asset_ready pipeline.
  - x:search
  - x:lookup
  - x:user
  - x:user_tweets
  - telegram:message
  - telegram:announce
  - discord:get_channel_history
  - discord:message
  - discord:thread_reply
  - discord:react
  - event:publish

data_sources: []

event_subscriptions:
  - strategist:ember_directive
  - claudeception:reflect
  - forge:asset_ready
  - reviewer:approved
  - reviewer:flagged

event_publications:
  - standup:report
  - ember:needs_asset
  - ember:asset_revision_requested
  - ember:content_ready
  - review:pending

review_bypass: []

humanize: true

content_weights:
  explainer_thread: 2
  engagement_post: 2
  market_observation: 1
  news_commentary: 1

heartbeat:
  precheck:
    enabled: true
    maxSilenceHours: 6
