name: Feature Request
description: Suggest a feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Describe what you'd like and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the current limitation?
      placeholder: I'm trying to... but YCLAW doesn't...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI
        - Core Runtime
        - Mission Control
        - New Adapter (channel/store/secret)
        - Deployment
        - Documentation
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references
