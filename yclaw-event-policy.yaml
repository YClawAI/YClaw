# YCLAW Event Bus Security Policy
# Protected by CODEOWNERS — requires human admin approval to modify.
#
# This policy defines which agents may publish which event types,
# what payload fields are permitted, and which fields are globally banned.
#
# Addresses: Unauthenticated event forgery → prompt injection
# (March 26 and April 2, 2026 incidents)

schemaVersion: "1.0"

sources:
  # Executive ────────────────────────────────────────────────────────────
  # Strategist — strategic directives (wildcard across strategist:* events)
  agent:strategist:
    allowedEventTypes:
      - "strategist:*"

  # Reviewer — review verdicts
  agent:reviewer:
    allowedEventTypes:
      - "reviewer:flagged"
      - "reviewer:approved"
      - "reviewer:rejected"

  # Development ──────────────────────────────────────────────────────────
  # Architect — build directives, deploy governance, and AO coordination
  agent:architect:
    allowedEventTypes:
      - "architect:build_directive"
      - "architect:repair_directive"
      - "architect:pr_review"
      - "architect:deploy_review"
      - "architect:design_directive"
      - "architect:mechanic_task"
      - "architect:task_complete"
      - "architect:task_blocked"
      - "deploy:assess"
      - "deploy:approve"

  # Designer — design events
  agent:designer:
    allowedEventTypes:
      - "designer:review_complete"
      - "designer:design_update"
      - "designer:mockup_ready"

  # Mechanic — maintenance events
  agent:mechanic:
    allowedEventTypes:
      - "mechanic:task_complete"
      - "mechanic:lockfile_updated"

  # Marketing ────────────────────────────────────────────────────────────
  # Ember — content events only
  agent:ember:
    allowedEventTypes:
      - "content:draft"
      - "content:published"

  # Forge — asset creation events
  agent:forge:
    allowedEventTypes:
      - "forge:asset_ready"
      - "forge:asset_failed"

  # Scout — research and outreach events
  agent:scout:
    allowedEventTypes:
      - "scout:intel_report"
      - "scout:outreach_ready"
      - "scout:competitor_alert"

  # Operations ───────────────────────────────────────────────────────────
  # Sentinel — operational events
  agent:sentinel:
    allowedEventTypes:
      - "sentinel:alert"
      - "sentinel:health"

  # Librarian — knowledge management events
  agent:librarian:
    allowedEventTypes:
      - "librarian:knowledge_update"
      - "librarian:curation_complete"

  # Finance ──────────────────────────────────────────────────────────────
  # Treasurer — financial events
  agent:treasurer:
    allowedEventTypes:
      - "treasurer:report_ready"
      - "treasurer:budget_alert"

  # Support ──────────────────────────────────────────────────────────────
  # Guide — support events
  agent:guide:
    allowedEventTypes:
      - "guide:case_resolved"
      - "guide:escalation"

  # Keeper — community moderation events
  agent:keeper:
    allowedEventTypes:
      - "keeper:support_case"
      - "keeper:moderation_action"

  # System sources ───────────────────────────────────────────────────────
  # AO (the coding agent) — build result events
  system:ao:
    allowedEventTypes:
      - "ao:task_completed"
      - "ao:task_failed"
      - "ao:task_blocked"
      - "ao:pr_ready"
      - "ao:spawn_failed"

  # GitHub webhook handler — github events
  system:webhook:
    allowedEventTypes:
      - "github:*"
      - "github:issue_closed"
      - "github:pr_merged"

# Fields that are NEVER allowed in ANY event payload, regardless of schema.
# These are the exact fields used in the April 2, 2026 attack.
globalDeniedFields:
  - sourcing_rule_update
  - multiplier_table_rule
  - system_prompt_override
  - memory_write
  - memory_update
  - tool_instruction
  - post_publication_audit
  - prompt_override
  - status_override
  - gate_bypass
  - audit_confirmed_clean

# Replay protection defaults
replay:
  maxAgeSeconds: 120
  maxClockSkewSeconds: 30
  cacheTtlSeconds: 600
