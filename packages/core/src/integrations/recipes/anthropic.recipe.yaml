integration: anthropic
name: Anthropic
tier: 1
credential_fields:
  - key: api_key
    label: API Key
    type: password
    placeholder: "sk-ant-..."
    help_url: https://console.anthropic.com/settings/keys
verify:
  method: GET
  url: https://api.anthropic.com/v1/models
  auth_style: x-api-key
  headers:
    x-api-key: "{api_key}"
    anthropic-version: "2023-06-01"
  expect_status: 200
steps:
  - id: collect
    actor: human
    label: Paste API key
  - id: store
    actor: system
    label: Store credentials
  - id: verify
    actor: system
    label: Verify connection
