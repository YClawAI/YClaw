name: yclaw-test
github:
  owner: yclaw-ai
  repo: yclaw-test
  default_branch: main
  branch_prefix: "agent/"

tech_stack:
  language: typescript
  framework: express
  package_manager: npm
  build_command: "npm run build"
  test_command: "npm test"
  lint_command: ""

risk_tier: auto
trust_level: sandboxed

deployment:
  type: none

codegen:
  preferred_backend: claude
  timeout_minutes: 30
  max_workspace_mb: 500
  claude_md_path: CLAUDE.md

secrets:
  codegen_secrets: []
  deploy_secrets: []
  github_token_scope: contents_rw

metadata:
  description: "Smoke test repo for E2E pipeline validation"
  primary_reviewers: [architect, designer]
